<div class="vjs-bar-column-chart">
  @for(chart of charts; track chart) {
    <div class="vjs-chart-example">
      <div class="vjs-chart-example-title">{{chart.desc}}</div>
      @if(chart.comments) {
        <div class="vjs-chart-example-comments">{{chart.comments}}</div>
      }
      <div class="vjs-chart-example-container">
        @if(chart.type === 'bar') {
          <vjs-bar-chart [options]="chart.options"></vjs-bar-chart>
        } @else if (chart.type === 'column') {
          <vjs-column-chart [options]="chart.options"></vjs-column-chart>
        }
      </div>
    </div>
  }
</div>
